<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jungle Wars</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  body {
    background: radial-gradient(ellipse at center, #1a3a1a 0%, #0a1a0a 100%);
    color: #f0e8d0;
    font-family: 'Arial', sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  #app { width: 100%; max-width: 820px; padding: 20px; text-align: center; }

  h1 {
    font-size: 64px; color: #ffd84a;
    text-shadow: 3px 3px 0 #000, 0 0 24px rgba(255,216,74,0.4);
    margin-bottom: 8px; letter-spacing: 2px;
  }
  h2 { font-size: 28px; color: #ffd84a; margin-bottom: 12px; }
  .tagline { font-size: 16px; opacity: 0.85; margin-bottom: 24px; }
  p { font-size: 16px; opacity: 0.85; margin: 6px 0; }

  .btn {
    cursor: pointer;
    font-family: 'Arial', sans-serif; font-size: 18px; font-weight: bold;
    text-transform: uppercase; letter-spacing: 1px;
    color: #f0e8d0; text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    padding: 14px 30px;
    background: linear-gradient(to bottom, #6a5a3a 0%, #4a3a20 50%, #3a2a14 51%, #4a3a20 100%);
    border: 2px solid #8a7a50;
    border-radius: 4px;
    box-shadow: inset 0 1px 0 rgba(255,255,200,0.2), inset 0 -1px 0 rgba(0,0,0,0.3), 0 2px 6px rgba(0,0,0,0.5);
    margin: 6px;
    min-width: 160px;
    touch-action: manipulation;
  }
  .btn:hover:not(:disabled) {
    background: linear-gradient(to bottom, #7a6a4a 0%, #5a4a30 50%, #4a3a24 51%, #5a4a30 100%);
    border-color: #aa9a60;
    color: #fff;
  }
  .btn:active:not(:disabled) {
    background: linear-gradient(to bottom, #3a2a14 0%, #4a3a20 50%, #5a4a30 51%, #4a3a20 100%);
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.primary {
    background: linear-gradient(to bottom, #6a8a3a 0%, #4a6a20 50%, #3a5a14 51%, #4a6a20 100%);
    border-color: #8aaa50;
  }
  .btn.primary:hover:not(:disabled) {
    background: linear-gradient(to bottom, #7a9a4a 0%, #5a7a30 50%, #4a6a24 51%, #5a7a30 100%);
    border-color: #aaca60;
  }

  .screen { display: none; flex-direction: column; align-items: center; gap: 12px; }
  .screen.active { display: flex; }

  .row { display: flex; flex-wrap: wrap; justify-content: center; }

  .code-box {
    font-family: 'Courier New', monospace;
    font-size: 52px; font-weight: bold; letter-spacing: 8px;
    color: #ffd84a; text-shadow: 2px 2px 0 #000;
    background: rgba(0,0,0,0.45);
    border: 2px dashed #8a7a50;
    border-radius: 6px;
    padding: 16px 24px;
    margin: 8px 0;
    user-select: all;
  }
  .code-input {
    font-family: 'Courier New', monospace;
    font-size: 32px; font-weight: bold; letter-spacing: 6px;
    text-align: center; text-transform: uppercase;
    color: #ffd84a;
    background: rgba(0,0,0,0.45);
    border: 2px solid #8a7a50; border-radius: 6px;
    padding: 14px;
    width: 280px; max-width: 90%;
    outline: none;
  }
  .code-input:focus { border-color: #ffd84a; }

  .status { font-size: 14px; color: #aaa; min-height: 20px; }
  .status.error { color: #ff7a5a; }
  .status.ok { color: #8acc6a; }

  .player-list {
    background: rgba(0,0,0,0.35);
    border: 1px solid #4a4a2a;
    border-radius: 6px;
    padding: 10px 14px;
    min-width: 280px;
    max-width: 360px;
    margin: 6px 0;
  }
  .player-list .row-line {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 4px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .player-list .row-line:last-child { border-bottom: none; }
  .player-list .swatch {
    width: 16px; height: 16px; border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.5);
    flex-shrink: 0;
  }
  .player-list .name { flex: 1; text-align: left; font-size: 15px; }
  .player-list .tag { font-size: 11px; color: #ffd84a; text-transform: uppercase; letter-spacing: 1px; }
  .player-list .empty { opacity: 0.4; font-style: italic; }

  canvas { border: 2px solid #2d5a1e; display: block; background: #2d5a1e; }
  #game { max-width: 100%; height: auto; }

  .small { font-size: 12px; opacity: 0.6; margin-top: 12px; }

  @media (max-width: 600px) {
    h1 { font-size: 44px; }
    .code-box { font-size: 38px; letter-spacing: 6px; padding: 14px 16px; }
    .code-input { font-size: 26px; }
    .btn { font-size: 16px; padding: 12px 20px; min-width: 130px; }
  }
</style>
</head>
<body>
<div id="app">

  <div id="screen-menu" class="screen active">
    <h1>Jungle Wars</h1>
    <p class="tagline">4-player jungle showdown · Last commander standing wins</p>
    <div class="row">
      <button class="btn primary" id="btn-host">Host</button>
      <button class="btn" id="btn-join">Join</button>
    </div>
  </div>

  <div id="screen-host" class="screen">
    <h2>Your Game Code</h2>
    <div class="code-box" id="host-code">······</div>
    <p>Share this code with up to 3 friends.</p>
    <div class="player-list" id="host-players"></div>
    <p class="status" id="host-status">Setting up…</p>
    <div class="row">
      <button class="btn primary" id="btn-start" disabled>Start Game</button>
      <button class="btn" data-back>Back</button>
    </div>
  </div>

  <div id="screen-join" class="screen">
    <h2>Enter Code</h2>
    <input class="code-input" id="join-code" maxlength="6"
           autocomplete="off" autocapitalize="characters" spellcheck="false"
           placeholder="ABC123">
    <p class="status" id="join-status"></p>
    <div class="row">
      <button class="btn primary" id="btn-join-submit">Join</button>
      <button class="btn" data-back>Back</button>
    </div>
  </div>

  <div id="screen-waiting" class="screen">
    <h2>You're In!</h2>
    <p>Waiting for the host to start the game…</p>
    <div class="player-list" id="waiting-players"></div>
    <p class="small">If the host disconnects, you'll be sent back to the menu.</p>
    <button class="btn" data-back>Leave</button>
  </div>

  <div id="screen-game" class="screen">
    <canvas id="game" width="800" height="600"></canvas>
    <p class="small" id="game-role"></p>
  </div>

</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
'use strict';

// ---------- Config ----------
const NAMESPACE = 'jungle-wars-';
const MAX_PLAYERS = 4;
const PLAYER_COLORS = [
  { hex: '#e07a2a', name: 'Tiger Orange' },
  { hex: '#5acc4a', name: 'Parrot Green' },
  { hex: '#a86a3a', name: 'Monkey Brown' },
  { hex: '#e0c84a', name: 'Snake Yellow' },
];

// ---------- DOM ----------
const screens = {
  menu: document.getElementById('screen-menu'),
  host: document.getElementById('screen-host'),
  join: document.getElementById('screen-join'),
  waiting: document.getElementById('screen-waiting'),
  game: document.getElementById('screen-game'),
};
function show(name) {
  for (const k in screens) screens[k].classList.toggle('active', k === name);
}
const hostCodeEl = document.getElementById('host-code');
const hostStatusEl = document.getElementById('host-status');
const hostPlayersEl = document.getElementById('host-players');
const startBtn = document.getElementById('btn-start');
const joinCodeEl = document.getElementById('join-code');
const joinStatusEl = document.getElementById('join-status');
const waitingPlayersEl = document.getElementById('waiting-players');
const gameRoleEl = document.getElementById('game-role');

function setStatus(el, text, kind) {
  el.textContent = text;
  el.className = 'status' + (kind ? ' ' + kind : '');
}
function setHostStatus(text, kind) { setStatus(hostStatusEl, text, kind); }
function setJoinStatus(text, kind) { setStatus(joinStatusEl, text, kind); }

// ---------- State ----------
let peer = null;
let isHost = false;
let myCode = null;
// Host: connections keyed by peerId. Join: single conn to host stored at conns['host'].
let conns = {};
// Roster of players (host is always slot 0).
let players = []; // [{slot, peerId, color, name, isHost}]

// ---------- Helpers ----------
function generateCode() {
  const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

function renderPlayerList(el, list, mySlot) {
  if (!list || list.length === 0) {
    el.innerHTML = '<div class="row-line empty">No players yet</div>';
    return;
  }
  const slotsToShow = MAX_PLAYERS;
  let html = '';
  for (let i = 0; i < slotsToShow; i++) {
    const p = list[i];
    if (p) {
      const me = p.slot === mySlot ? '<span class="tag">You</span>' : '';
      const hostTag = p.isHost ? '<span class="tag">Host</span>' : '';
      html += `<div class="row-line">
        <span class="swatch" style="background:${p.color}"></span>
        <span class="name">${p.name}</span>
        ${hostTag}${me}
      </div>`;
    } else {
      html += `<div class="row-line empty">
        <span class="swatch" style="background:#333;border-color:#222"></span>
        <span class="name">Waiting for player…</span>
      </div>`;
    }
  }
  el.innerHTML = html;
}

function destroyEverything() {
  for (const id in conns) {
    try { conns[id].close(); } catch (e) {}
  }
  conns = {};
  try { if (peer) peer.destroy(); } catch (e) {}
  peer = null;
  isHost = false;
  myCode = null;
  players = [];
}

function backToMenu() {
  destroyEverything();
  show('menu');
}

// ---------- Wiring ----------
document.getElementById('btn-host').onclick = startHosting;
document.getElementById('btn-join').onclick = () => {
  show('join');
  setJoinStatus('');
  joinCodeEl.value = '';
  setTimeout(() => joinCodeEl.focus(), 50);
};
document.querySelectorAll('[data-back]').forEach(b => b.onclick = backToMenu);

document.getElementById('btn-start').onclick = () => {
  if (!isHost) return;
  // Need at least 2 players for last-one-standing.
  if (players.length < 2) return;
  broadcastToAll({ type: 'start' });
  enterGame();
};
document.getElementById('btn-join-submit').onclick = submitJoin;
joinCodeEl.addEventListener('keydown', e => { if (e.key === 'Enter') submitJoin(); });

// ---------- Host ----------
function startHosting() {
  isHost = true;
  show('host');
  hostCodeEl.textContent = '······';
  setHostStatus('Connecting to lobby server…');
  startBtn.disabled = true;
  // Host occupies slot 0.
  players = [{
    slot: 0, peerId: 'self',
    color: PLAYER_COLORS[0].hex, name: 'Player 1', isHost: true,
  }];
  renderPlayerList(hostPlayersEl, players, 0);
  tryClaimCode(0);
}

function tryClaimCode(attempt) {
  if (attempt >= 5) {
    setHostStatus('Could not get a free code. Try again.', 'error');
    return;
  }
  const code = generateCode();
  const peerId = NAMESPACE + code;
  const p = new Peer(peerId, { debug: 1 });
  p.on('open', () => {
    peer = p;
    myCode = code;
    hostCodeEl.textContent = code;
    setHostStatus('Waiting for players to join…');
  });
  p.on('connection', incoming => acceptIncoming(incoming));
  p.on('error', err => {
    if (err && err.type === 'unavailable-id') {
      try { p.destroy(); } catch (e) {}
      tryClaimCode(attempt + 1);
      return;
    }
    setHostStatus('Connection error: ' + ((err && err.type) || 'unknown'), 'error');
  });
  p.on('disconnected', () => setHostStatus('Disconnected from lobby. Reconnecting…', 'error'));
}

function acceptIncoming(incoming) {
  // Reject if lobby full.
  if (players.length >= MAX_PLAYERS) {
    incoming.on('open', () => {
      try { incoming.send({ type: 'rejected', reason: 'full' }); } catch (e) {}
      try { incoming.close(); } catch (e) {}
    });
    return;
  }
  conns[incoming.peer] = incoming;

  incoming.on('open', () => {
    // Assign next free slot 1..3 (host is 0).
    const usedSlots = new Set(players.map(p => p.slot));
    let slot = 1;
    while (usedSlots.has(slot)) slot++;
    if (slot >= MAX_PLAYERS) {
      try { incoming.send({ type: 'rejected', reason: 'full' }); } catch (e) {}
      try { incoming.close(); } catch (e) {}
      delete conns[incoming.peer];
      return;
    }
    const colorObj = PLAYER_COLORS[slot] || PLAYER_COLORS[PLAYER_COLORS.length - 1];
    const newPlayer = {
      slot, peerId: incoming.peer,
      color: colorObj.hex, name: 'Player ' + (slot + 1), isHost: false,
    };
    players.push(newPlayer);
    players.sort((a, b) => a.slot - b.slot);
    incoming.send({ type: 'welcome', yourSlot: slot });
    broadcastRoster();
    renderPlayerList(hostPlayersEl, players, 0);
    setHostStatus(
      players.length === MAX_PLAYERS
        ? 'Lobby full! Press Start when ready.'
        : `${players.length} of ${MAX_PLAYERS} joined. Press Start when ready (need 2+).`,
      'ok'
    );
    startBtn.disabled = players.length < 2;
  });

  incoming.on('close', () => removeConnection(incoming.peer));
  incoming.on('error', () => removeConnection(incoming.peer));
  incoming.on('data', () => { /* clients say nothing for v1 */ });
}

function removeConnection(peerId) {
  if (!isHost) return;
  delete conns[peerId];
  const before = players.length;
  players = players.filter(p => p.peerId !== peerId);
  if (players.length === before) return;
  broadcastRoster();
  renderPlayerList(hostPlayersEl, players, 0);
  if (players.length < 2) {
    startBtn.disabled = true;
    setHostStatus('Waiting for players to join…');
  } else {
    setHostStatus(`${players.length} of ${MAX_PLAYERS} joined. Press Start when ready.`, 'ok');
  }
}

function broadcastRoster() {
  broadcastToAll({ type: 'roster', players });
}
function broadcastToAll(msg) {
  for (const id in conns) {
    try { conns[id].send(msg); } catch (e) {}
  }
}

// ---------- Join ----------
function submitJoin() {
  const code = joinCodeEl.value.trim().toUpperCase();
  if (code.length !== 6) {
    setJoinStatus('Code should be 6 characters.', 'error');
    return;
  }
  isHost = false;
  setJoinStatus('Connecting…');
  document.getElementById('btn-join-submit').disabled = true;

  const p = new Peer(undefined, { debug: 1 });
  p.on('open', () => {
    peer = p;
    const c = p.connect(NAMESPACE + code, { reliable: true });
    let opened = false;
    let timeoutId = setTimeout(() => {
      if (!opened) {
        setJoinStatus('No host found for that code.', 'error');
        document.getElementById('btn-join-submit').disabled = false;
        try { c.close(); } catch (e) {}
        try { p.destroy(); } catch (e) {}
      }
    }, 8000);

    c.on('open', () => {
      opened = true;
      clearTimeout(timeoutId);
      conns['host'] = c;
      setJoinStatus('');
      document.getElementById('btn-join-submit').disabled = false;
    });
    c.on('data', data => {
      if (!data) return;
      if (data.type === 'rejected') {
        if (data.reason === 'full') setJoinStatus('That game is full.', 'error');
        else setJoinStatus('Could not join.', 'error');
        document.getElementById('btn-join-submit').disabled = false;
        try { c.close(); } catch (e) {}
        try { p.destroy(); } catch (e) {}
        return;
      }
      if (data.type === 'welcome') {
        // Move to waiting room as soon as we know our slot.
        show('waiting');
      }
      if (data.type === 'roster') {
        players = data.players || [];
        const mine = players.find(p => p.peerId === peer.id);
        renderPlayerList(waitingPlayersEl, players, mine ? mine.slot : -1);
      }
      if (data.type === 'start') {
        enterGame();
      }
    });
    c.on('close', () => {
      // Host went away.
      backToMenu();
    });
    c.on('error', err => {
      if (!opened) {
        clearTimeout(timeoutId);
        setJoinStatus('Could not reach that game. Check the code.', 'error');
        document.getElementById('btn-join-submit').disabled = false;
        try { p.destroy(); } catch (e) {}
      }
    });
  });
  p.on('error', err => {
    setJoinStatus('Connection error: ' + ((err && err.type) || 'unknown'), 'error');
    document.getElementById('btn-join-submit').disabled = false;
  });
}

// ---------- Game (placeholder) ----------
function enterGame() {
  show('game');
  const me = isHost
    ? players[0]
    : (players.find(p => p.peerId === (peer && peer.id)) || null);
  if (me) {
    gameRoleEl.textContent = `You are ${me.name} (${PLAYER_COLORS[me.slot].name})`;
  } else {
    gameRoleEl.textContent = isHost ? 'You are the host' : 'You joined the game';
  }
  const ctx = document.getElementById('game').getContext('2d');
  ctx.fillStyle = '#2d5a1e';
  ctx.fillRect(0, 0, 800, 600);
  ctx.fillStyle = '#ffd84a';
  ctx.font = 'bold 48px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('Jungle Wars', 400, 280);
  ctx.font = '20px Arial';
  ctx.fillStyle = '#f0e8d0';
  ctx.fillText(`${players.length} commanders ready.`, 400, 320);
  ctx.fillText('(Game logic coming next phase.)', 400, 348);
}
</script>
</body>
</html>
