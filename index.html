<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jungle Wars</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  body {
    background: radial-gradient(ellipse at center, #1a3a1a 0%, #0a1a0a 100%);
    color: #f0e8d0;
    font-family: 'Arial', sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  #app { width: 100%; max-width: 820px; padding: 20px; text-align: center; }

  h1 {
    font-size: 64px; color: #ffd84a;
    text-shadow: 3px 3px 0 #000, 0 0 24px rgba(255,216,74,0.4);
    margin-bottom: 8px; letter-spacing: 2px;
  }
  h2 { font-size: 28px; color: #ffd84a; margin-bottom: 12px; }
  .tagline { font-size: 16px; opacity: 0.85; margin-bottom: 24px; }
  p { font-size: 16px; opacity: 0.85; margin: 6px 0; }

  .btn {
    cursor: pointer;
    font-family: 'Arial', sans-serif; font-size: 18px; font-weight: bold;
    text-transform: uppercase; letter-spacing: 1px;
    color: #f0e8d0; text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    padding: 14px 30px;
    background: linear-gradient(to bottom, #6a5a3a 0%, #4a3a20 50%, #3a2a14 51%, #4a3a20 100%);
    border: 2px solid #8a7a50;
    border-radius: 4px;
    box-shadow: inset 0 1px 0 rgba(255,255,200,0.2), inset 0 -1px 0 rgba(0,0,0,0.3), 0 2px 6px rgba(0,0,0,0.5);
    margin: 6px;
    min-width: 160px;
    touch-action: manipulation;
  }
  .btn:hover:not(:disabled) {
    background: linear-gradient(to bottom, #7a6a4a 0%, #5a4a30 50%, #4a3a24 51%, #5a4a30 100%);
    border-color: #aa9a60;
    color: #fff;
  }
  .btn:active:not(:disabled) {
    background: linear-gradient(to bottom, #3a2a14 0%, #4a3a20 50%, #5a4a30 51%, #4a3a20 100%);
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.primary {
    background: linear-gradient(to bottom, #6a8a3a 0%, #4a6a20 50%, #3a5a14 51%, #4a6a20 100%);
    border-color: #8aaa50;
  }
  .btn.primary:hover:not(:disabled) {
    background: linear-gradient(to bottom, #7a9a4a 0%, #5a7a30 50%, #4a6a24 51%, #5a7a30 100%);
    border-color: #aaca60;
  }

  .screen { display: none; flex-direction: column; align-items: center; gap: 12px; }
  .screen.active { display: flex; }

  .row { display: flex; flex-wrap: wrap; justify-content: center; }

  .code-box {
    font-family: 'Courier New', monospace;
    font-size: 52px; font-weight: bold; letter-spacing: 8px;
    color: #ffd84a; text-shadow: 2px 2px 0 #000;
    background: rgba(0,0,0,0.45);
    border: 2px dashed #8a7a50;
    border-radius: 6px;
    padding: 16px 24px;
    margin: 8px 0;
    user-select: all;
  }
  .code-input {
    font-family: 'Courier New', monospace;
    font-size: 32px; font-weight: bold; letter-spacing: 6px;
    text-align: center; text-transform: uppercase;
    color: #ffd84a;
    background: rgba(0,0,0,0.45);
    border: 2px solid #8a7a50; border-radius: 6px;
    padding: 14px;
    width: 280px; max-width: 90%;
    outline: none;
  }
  .code-input:focus { border-color: #ffd84a; }

  .name-input {
    font-family: 'Arial', sans-serif;
    font-size: 18px; font-weight: bold;
    text-align: center;
    color: #f0e8d0;
    background: rgba(0,0,0,0.45);
    border: 2px solid #8a7a50; border-radius: 6px;
    padding: 10px 14px;
    width: 240px; max-width: 90%;
    outline: none;
    margin: 8px 0 4px 0;
  }
  .name-input:focus { border-color: #ffd84a; }
  .name-input::placeholder { color: #888; font-weight: normal; }
  .name-label {
    font-size: 13px; color: #aaa; text-transform: uppercase; letter-spacing: 1px;
    margin-top: 6px;
  }

  .status { font-size: 14px; color: #aaa; min-height: 20px; }
  .status.error { color: #ff7a5a; }
  .status.ok { color: #8acc6a; }

  .player-list {
    background: rgba(0,0,0,0.35);
    border: 1px solid #4a4a2a;
    border-radius: 6px;
    padding: 10px 14px;
    min-width: 280px;
    max-width: 360px;
    margin: 6px 0;
  }
  .player-list .row-line {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 4px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .player-list .row-line:last-child { border-bottom: none; }
  .player-list .swatch {
    width: 16px; height: 16px; border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.5);
    flex-shrink: 0;
  }
  .player-list .name { flex: 1; text-align: left; font-size: 15px; }
  .player-list .tag { font-size: 11px; color: #ffd84a; text-transform: uppercase; letter-spacing: 1px; }
  .player-list .tag.cpu { color: #8acc6a; }
  .player-list .empty { opacity: 0.4; font-style: italic; }
  .player-list .remove {
    cursor: pointer; color: #ff7a5a; font-size: 18px; font-weight: bold;
    padding: 0 4px; line-height: 1; opacity: 0.7;
    background: none; border: none;
  }
  .player-list .remove:hover { opacity: 1; }
  .player-list .diff-select {
    background: rgba(0,0,0,0.5); color: #f0e8d0;
    border: 1px solid #5a5a3a; border-radius: 3px;
    font-family: 'Arial', sans-serif; font-size: 12px;
    padding: 3px 6px; cursor: pointer;
  }
  .player-list .diff-select:focus { outline: none; border-color: #ffd84a; }
  .player-list .diff-label {
    font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px;
  }

  canvas { border: 2px solid #2d5a1e; display: block; background: #2d5a1e; }
  #game { max-width: 100%; height: auto; }

  .small { font-size: 12px; opacity: 0.6; margin-top: 12px; }

  /* ---- Phase 2: Game scene ---- */
  .game-frame { position: relative; width: 800px; max-width: 100%; }
  .game-overlay {
    position: absolute; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column; align-items: stretch;
    padding: 8px;
    pointer-events: none;
  }
  .mana-bar {
    position: relative;
    height: 22px;
    background: rgba(0,0,0,0.55);
    border: 1px solid #2a4a6a;
    border-radius: 11px;
    margin: 0 auto 8px auto;
    width: 280px; max-width: 80%;
    overflow: hidden;
  }
  .mana-fill {
    position: absolute; top: 0; left: 0; bottom: 0;
    background: linear-gradient(to right, #3a8acc, #6acce0);
    width: 0%;
    transition: width 0.1s linear;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .mana-text {
    position: absolute; left: 0; right: 0; top: 0; bottom: 0;
    display: flex; justify-content: center; align-items: center;
    font-family: 'Arial', sans-serif; font-size: 13px; font-weight: bold;
    color: #fff; text-shadow: 1px 1px 2px #000;
    letter-spacing: 1px;
  }
  .card-hand {
    display: flex; gap: 10px; justify-content: center;
    pointer-events: auto;
  }
  .card {
    width: 96px; height: 144px;
    background:
      linear-gradient(135deg, transparent 0%, transparent 48%, rgba(255,255,200,0.08) 50%, transparent 52%, transparent 100%),
      linear-gradient(to bottom, #f0d890 0%, #d8aa56 50%, #b8862c 100%);
    border: 2px solid #5a3010;
    border-radius: 8px;
    box-shadow:
      0 4px 8px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.4),
      inset 0 -2px 0 rgba(0,0,0,0.18);
    color: #2a1a0a;
    font-family: 'Georgia', 'Times New Roman', serif;
    cursor: pointer;
    user-select: none; -webkit-user-select: none;
    position: relative;
    display: flex; flex-direction: column;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    touch-action: manipulation;
  }
  /* Inner thin frame */
  .card::before {
    content: '';
    position: absolute;
    top: 3px; left: 3px; right: 3px; bottom: 3px;
    border: 1px solid rgba(90, 50, 16, 0.55);
    border-radius: 5px;
    pointer-events: none;
    z-index: 1;
  }
  /* Decorative corner dots */
  .card::after {
    content: '';
    position: absolute;
    top: 7px; left: 7px; right: 7px; bottom: 7px;
    background:
      radial-gradient(circle 2px at 0 0, #5a3010 100%, transparent 100%),
      radial-gradient(circle 2px at 100% 0, #5a3010 100%, transparent 100%),
      radial-gradient(circle 2px at 0 100%, #5a3010 100%, transparent 100%),
      radial-gradient(circle 2px at 100% 100%, #5a3010 100%, transparent 100%);
    pointer-events: none;
  }
  .card:hover {
    transform: translateY(-8px) scale(1.04);
    box-shadow:
      0 10px 16px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,255,255,0.5),
      0 0 18px rgba(255, 216, 74, 0.35);
  }
  .card.selected {
    transform: translateY(-14px) scale(1.07);
    box-shadow:
      0 0 0 3px #ffd84a,
      0 12px 22px rgba(0,0,0,0.7),
      0 0 28px rgba(255, 216, 74, 0.65);
  }
  .card.too-expensive {
    filter: grayscale(0.85) brightness(0.55);
    cursor: not-allowed;
  }
  .card.too-expensive .card-cost {
    background: radial-gradient(circle at 30% 30%, #aaa, #555);
    box-shadow: 0 1px 2px rgba(0,0,0,0.4);
    border-color: #888;
  }
  /* Top name banner */
  .card-name {
    background: linear-gradient(to bottom, #4a2810 0%, #6a3a1a 50%, #4a2810 100%);
    color: #ffd84a;
    text-align: center;
    font-weight: bold;
    font-size: 9.5px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 4px 4px 3px 4px;
    border-bottom: 1.5px solid #2a1408;
    border-top-left-radius: 6px;
    border-top-right-radius: 6px;
    text-shadow: 1px 1px 0 #000;
    line-height: 1.1;
    z-index: 2; position: relative;
  }
  /* Circular jungle medallion holding the icon */
  .card-art {
    width: 64px; height: 64px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 30%, #4a8a3a, #1a3a18 70%),
      #2a5a2a;
    border: 2px solid #5a3010;
    margin: 8px auto 0 auto;
    display: flex; justify-content: center; align-items: center;
    box-shadow:
      inset 0 2px 4px rgba(0,0,0,0.45),
      inset 0 -2px 4px rgba(255,255,255,0.05),
      0 1px 2px rgba(0,0,0,0.3);
    position: relative;
    z-index: 2;
  }
  .card-art::before {
    /* Tiny vine accents inside the medallion */
    content: '';
    position: absolute;
    top: 4px; left: 4px; right: 4px; bottom: 4px;
    border-radius: 50%;
    background:
      radial-gradient(ellipse 8px 4px at 20% 80%, rgba(90,200,90,0.25), transparent 60%),
      radial-gradient(ellipse 6px 3px at 80% 75%, rgba(90,200,90,0.2), transparent 60%);
    pointer-events: none;
  }
  .card-icon {
    font-size: 36px; line-height: 1;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5));
    z-index: 2;
  }
  /* Mana cost gem stuck onto the top-right corner of the card */
  .card-cost {
    position: absolute;
    top: -8px; right: -8px;
    width: 24px; height: 24px; border-radius: 50%;
    background: radial-gradient(circle at 30% 28%, #9aeaff 0%, #3a8acc 50%, #1a4a8a 100%);
    border: 2px solid #fff;
    box-shadow:
      0 0 8px rgba(106, 204, 224, 0.7),
      0 1px 2px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.6);
    display: flex; justify-content: center; align-items: center;
    font-family: 'Arial', sans-serif;
    font-size: 12px; font-weight: bold;
    color: #fff;
    text-shadow: 1px 1px 1px #000, 0 0 4px rgba(0,0,0,0.6);
    z-index: 3;
  }
  /* Bottom stat strip */
  .card-stats {
    margin-top: auto;
    display: flex; justify-content: space-around; align-items: center;
    background: linear-gradient(to bottom, rgba(60, 30, 10, 0.15), rgba(60, 30, 10, 0.35));
    border-top: 1.5px solid rgba(60, 30, 10, 0.5);
    border-bottom-left-radius: 6px;
    border-bottom-right-radius: 6px;
    padding: 4px 2px;
    font-family: 'Arial', sans-serif;
    font-size: 11px; font-weight: bold;
    z-index: 2; position: relative;
  }
  .card-stats .stat { display: flex; align-items: center; gap: 3px; }
  .card-stats .hp  { color: #b22020; }
  .card-stats .dmg { color: #5a2a08; }
  .card-stats .stat svg { display: block; }
  .game-hud-top {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 8px 12px;
    display: flex; justify-content: space-between; align-items: center;
    pointer-events: none;
    color: #fff; font-family: Arial; font-size: 13px;
    text-shadow: 1px 1px 2px #000;
  }
  .game-hud-top .you-tag {
    background: rgba(0,0,0,0.5);
    padding: 4px 10px; border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .game-hud-top .you-tag .swatch {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 50%; vertical-align: middle;
    margin-right: 6px;
  }
  .game-hud-top .mute-btn {
    pointer-events: auto; cursor: pointer;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 14px;
    font-family: Arial;
  }

  /* Winner screen overlay */
  #winner-overlay {
    position: absolute; inset: 0;
    background: rgba(10, 20, 10, 0.85);
    display: none;
    flex-direction: column; justify-content: center; align-items: center;
    z-index: 50;
    color: #fff; text-align: center;
  }
  #winner-overlay.active { display: flex; }
  #winner-overlay h2 {
    font-size: 56px; margin-bottom: 14px;
    color: #ffd84a; text-shadow: 4px 4px 0 #000, 0 0 28px rgba(255,216,74,0.6);
  }
  #winner-overlay .winner-name {
    font-size: 30px; font-weight: bold;
    margin-bottom: 30px;
    text-shadow: 2px 2px 0 #000;
  }
  #winner-overlay .winner-name .swatch {
    display: inline-block; width: 22px; height: 22px;
    border-radius: 50%; vertical-align: middle;
    margin-right: 12px;
    border: 2px solid #fff;
  }
  #winner-overlay .row { display: flex; gap: 12px; justify-content: center; }

  @media (max-width: 600px) {
    h1 { font-size: 44px; }
    .code-box { font-size: 38px; letter-spacing: 6px; padding: 14px 16px; }
    .code-input { font-size: 26px; }
    .btn { font-size: 16px; padding: 12px 20px; min-width: 130px; }
  }

  #debug-log {
    position: fixed; bottom: 0; left: 0; right: 0;
    max-height: 35vh; overflow-y: auto;
    background: rgba(0,0,0,0.85);
    color: #8acc6a;
    font-family: 'Courier New', monospace; font-size: 11px;
    padding: 8px 12px; padding-bottom: 24px;
    border-top: 1px solid #4a4a2a;
    z-index: 999; display: none;
  }
  #debug-log.active { display: block; }
  #debug-log .err { color: #ff7a5a; }
  #debug-log .info { color: #ffd84a; }
  #debug-log-toggle {
    position: fixed; bottom: 4px; right: 8px;
    background: #333; color: #aaa; border: 1px solid #555;
    font-size: 10px; padding: 2px 6px; border-radius: 3px;
    cursor: pointer; z-index: 1000;
    font-family: monospace;
  }
</style>
</head>
<body>
<div id="app">

  <div id="screen-menu" class="screen active">
    <h1>Jungle Wars</h1>
    <p class="tagline">4-player jungle showdown · Last commander standing wins</p>
    <div class="name-label">Your Name</div>
    <input class="name-input" id="player-name" maxlength="14"
           placeholder="Type your name" autocomplete="off" spellcheck="false">
    <p class="status" id="menu-status"></p>
    <div class="row">
      <button class="btn primary" id="btn-host">Host</button>
      <button class="btn" id="btn-join">Join</button>
    </div>
  </div>

  <div id="screen-host" class="screen">
    <h2>Your Game Code</h2>
    <div class="code-box" id="host-code">······</div>
    <p>Share this code with up to 3 friends.</p>
    <div class="player-list" id="host-players"></div>
    <p class="status" id="host-status">Setting up…</p>
    <div class="row">
      <button class="btn" id="btn-add-cpu">+ Add CPU</button>
    </div>
    <div class="row">
      <button class="btn primary" id="btn-start" disabled>Start Game</button>
      <button class="btn" data-back>Back</button>
    </div>
  </div>

  <div id="screen-join" class="screen">
    <h2>Enter Code</h2>
    <input class="code-input" id="join-code" maxlength="6"
           autocomplete="off" autocapitalize="characters" spellcheck="false"
           placeholder="ABC123">
    <p class="status" id="join-status"></p>
    <div class="row">
      <button class="btn primary" id="btn-join-submit">Join</button>
      <button class="btn" data-back>Back</button>
    </div>
  </div>

  <div id="screen-waiting" class="screen">
    <h2>You're In!</h2>
    <p>Waiting for the host to start the game…</p>
    <div class="player-list" id="waiting-players"></div>
    <p class="small">If the host disconnects, you'll be sent back to the menu.</p>
    <button class="btn" data-back>Leave</button>
  </div>

  <div id="screen-game" class="screen">
    <div class="game-frame">
      <canvas id="game" width="800" height="600"></canvas>
      <div class="game-hud-top">
        <span class="you-tag" id="you-tag"></span>
        <span id="game-info"></span>
        <button class="mute-btn" id="btn-mute" title="Mute sounds">🔊</button>
      </div>
      <div class="game-overlay">
        <div class="mana-bar">
          <div class="mana-fill" id="mana-fill"></div>
          <span class="mana-text" id="mana-text">0 / 10</span>
        </div>
        <div class="card-hand" id="card-hand"></div>
      </div>
      <div id="winner-overlay">
        <h2 id="winner-title">VICTORY!</h2>
        <div class="winner-name" id="winner-name"></div>
        <div class="row">
          <button class="btn primary" id="btn-play-again">Back to Menu</button>
        </div>
      </div>
    </div>
  </div>

</div>

<button id="debug-log-toggle">debug</button>
<div id="debug-log"></div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
'use strict';

// ---------- Config ----------
const NAMESPACE = 'jungle-wars-';
const MAX_PLAYERS = 4;
const PLAYER_COLORS = [
  { hex: '#e07a2a', name: 'Tiger Orange' },
  { hex: '#5acc4a', name: 'Parrot Green' },
  { hex: '#a86a3a', name: 'Monkey Brown' },
  { hex: '#e0c84a', name: 'Snake Yellow' },
];

// PeerJS connection options. We force TURN-relay mode so the connection
// always goes through a public relay server. This is the most reliable
// way to make two tabs (or two devices behind any kind of firewall)
// actually talk to each other. For a low-bandwidth card game the small
// latency hit is irrelevant.
const PEER_OPTS = {
  debug: 2,
  config: {
    iceTransportPolicy: 'relay',
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun.cloudflare.com:3478' },
      {
        urls: 'turn:openrelay.metered.ca:80',
        username: 'openrelayproject',
        credential: 'openrelayproject',
      },
      {
        urls: 'turn:openrelay.metered.ca:443',
        username: 'openrelayproject',
        credential: 'openrelayproject',
      },
      {
        urls: 'turn:openrelay.metered.ca:443?transport=tcp',
        username: 'openrelayproject',
        credential: 'openrelayproject',
      },
    ],
  },
};

// ---------- Debug log ----------
const debugLogEl = document.getElementById('debug-log');
const debugToggleEl = document.getElementById('debug-log-toggle');
let debugVisible = false;
function dlog(msg, kind) {
  const t = new Date().toLocaleTimeString();
  const cls = kind ? ` class="${kind}"` : '';
  debugLogEl.innerHTML += `<div${cls}>[${t}] ${msg}</div>`;
  debugLogEl.scrollTop = debugLogEl.scrollHeight;
  console.log('[debug]', msg);
}
debugToggleEl.onclick = () => {
  debugVisible = !debugVisible;
  debugLogEl.classList.toggle('active', debugVisible);
};
// Auto-show on errors so the user sees them.
window.addEventListener('error', e => {
  dlog('JS ERROR: ' + (e.message || e), 'err');
  if (!debugVisible) { debugVisible = true; debugLogEl.classList.add('active'); }
});

// ---------- DOM ----------
const screens = {
  menu: document.getElementById('screen-menu'),
  host: document.getElementById('screen-host'),
  join: document.getElementById('screen-join'),
  waiting: document.getElementById('screen-waiting'),
  game: document.getElementById('screen-game'),
};
function show(name) {
  for (const k in screens) screens[k].classList.toggle('active', k === name);
}
const hostCodeEl = document.getElementById('host-code');
const hostStatusEl = document.getElementById('host-status');
const hostPlayersEl = document.getElementById('host-players');
const startBtn = document.getElementById('btn-start');
const joinCodeEl = document.getElementById('join-code');
const joinStatusEl = document.getElementById('join-status');
const waitingPlayersEl = document.getElementById('waiting-players');

function setStatus(el, text, kind) {
  el.textContent = text;
  el.className = 'status' + (kind ? ' ' + kind : '');
}
function setHostStatus(text, kind) { setStatus(hostStatusEl, text, kind); }
function setJoinStatus(text, kind) { setStatus(joinStatusEl, text, kind); }

// ---------- State ----------
let peer = null;
let isHost = false;
let myCode = null;
let myName = '';
let gameStarted = false;
// Host: connections keyed by peerId. Join: single conn to host stored at conns['host'].
let conns = {};
// Roster of players (host is always slot 0).
let players = []; // [{slot, peerId, color, name, isHost}]

// ---------- Helpers ----------
function generateCode() {
  const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

// Escape user-supplied text before putting it into HTML.
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

// Read player name from the input. Cleared on every page refresh.
const nameInputEl = document.getElementById('player-name');
const menuStatusEl = document.getElementById('menu-status');

function getName() {
  return (nameInputEl.value || '').trim();
}
function requireName() {
  const n = getName();
  if (!n) {
    menuStatusEl.textContent = 'Please type your name first.';
    menuStatusEl.className = 'status error';
    nameInputEl.focus();
    return null;
  }
  menuStatusEl.textContent = '';
  return n;
}

function renderPlayerList(el, list, mySlot, opts) {
  opts = opts || {};
  // Build a slot-indexed view so empty slots render as "Waiting…"
  const bySlot = {};
  for (const p of list || []) bySlot[p.slot] = p;
  let html = '';
  for (let slot = 0; slot < MAX_PLAYERS; slot++) {
    const p = bySlot[slot];
    if (p) {
      const me = p.slot === mySlot ? '<span class="tag">You</span>' : '';
      const hostTag = p.isHost ? '<span class="tag">Host</span>' : '';
      const cpuTag = p.isCPU ? '<span class="tag cpu">CPU</span>' : '';
      const safeName = escapeHtml(p.name || '');
      let diffEl = '';
      if (p.isCPU) {
        if (opts.canRemoveCPU) {
          // Host view: editable dropdown.
          const cur = p.difficulty || 'normal';
          diffEl = `<select class="diff-select" data-diff-slot="${p.slot}">
            <option value="easy"${cur === 'easy' ? ' selected' : ''}>Easy</option>
            <option value="normal"${cur === 'normal' ? ' selected' : ''}>Normal</option>
            <option value="hard"${cur === 'hard' ? ' selected' : ''}>Hard</option>
          </select>`;
        } else {
          // Joiner view: read-only label.
          const labelMap = { easy: 'Easy', normal: 'Normal', hard: 'Hard' };
          diffEl = `<span class="diff-label">${labelMap[p.difficulty] || 'Normal'}</span>`;
        }
      }
      const removeBtn = (opts.canRemoveCPU && p.isCPU)
        ? `<button class="remove" data-remove-slot="${p.slot}" title="Remove CPU">✕</button>`
        : '';
      html += `<div class="row-line">
        <span class="swatch" style="background:${p.color}"></span>
        <span class="name">${safeName}</span>
        ${hostTag}${cpuTag}${me}${diffEl}${removeBtn}
      </div>`;
    } else {
      html += `<div class="row-line empty">
        <span class="swatch" style="background:#333;border-color:#222"></span>
        <span class="name">Waiting…</span>
      </div>`;
    }
  }
  el.innerHTML = html;
  // Wire up host-only controls.
  if (opts.canRemoveCPU) {
    el.querySelectorAll('[data-remove-slot]').forEach(btn => {
      btn.onclick = () => removeCPU(parseInt(btn.dataset.removeSlot, 10));
    });
    el.querySelectorAll('[data-diff-slot]').forEach(sel => {
      sel.onchange = () => setCPUDifficulty(parseInt(sel.dataset.diffSlot, 10), sel.value);
    });
  }
}

function destroyEverything() {
  // Stop the render loop so it doesn't keep running after we leave.
  if (gameState) gameState.active = false;
  gameState = null;
  for (const id in conns) {
    try { conns[id].close(); } catch (e) {}
  }
  conns = {};
  try { if (peer) peer.destroy(); } catch (e) {}
  peer = null;
  isHost = false;
  myCode = null;
  gameStarted = false;
  players = [];
}

function backToMenu() {
  destroyEverything();
  show('menu');
}

// ---------- Wiring ----------
document.getElementById('btn-host').onclick = () => {
  const n = requireName();
  if (!n) return;
  myName = n;
  startHosting();
};
document.getElementById('btn-join').onclick = () => {
  const n = requireName();
  if (!n) return;
  myName = n;
  show('join');
  setJoinStatus('');
  joinCodeEl.value = '';
  setTimeout(() => joinCodeEl.focus(), 50);
};
document.querySelectorAll('[data-back]').forEach(b => b.onclick = backToMenu);

document.getElementById('btn-start').onclick = () => {
  if (!isHost || gameStarted) return;
  // Need at least 2 players for last-one-standing.
  if (players.length < 2) return;
  ensureAudio(); // browsers need a user gesture to unlock audio
  gameStarted = true;
  broadcastToAll({ type: 'start' });
  enterGame();
};
document.getElementById('btn-add-cpu').onclick = addCPU;
document.getElementById('btn-join-submit').onclick = submitJoin;
joinCodeEl.addEventListener('keydown', e => { if (e.key === 'Enter') submitJoin(); });

function nextFreeSlot() {
  const used = new Set(players.map(p => p.slot));
  for (let s = 0; s < MAX_PLAYERS; s++) if (!used.has(s)) return s;
  return -1;
}

let cpuCounter = 0;
function addCPU() {
  if (!isHost || players.length >= MAX_PLAYERS) return;
  const slot = nextFreeSlot();
  if (slot < 0) return;
  cpuCounter++;
  const colorObj = PLAYER_COLORS[slot] || PLAYER_COLORS[PLAYER_COLORS.length - 1];
  players.push({
    slot, peerId: 'cpu-' + cpuCounter,
    color: colorObj.hex, name: 'CPU ' + cpuCounter, isHost: false, isCPU: true,
    difficulty: 'normal',
  });
  players.sort((a, b) => a.slot - b.slot);
  refreshHostUI();
  broadcastRoster();
}

function removeCPU(slot) {
  if (!isHost) return;
  const before = players.length;
  players = players.filter(p => !(p.isCPU && p.slot === slot));
  if (players.length === before) return;
  refreshHostUI();
  broadcastRoster();
}

function setCPUDifficulty(slot, difficulty) {
  if (!isHost) return;
  if (!['easy', 'normal', 'hard'].includes(difficulty)) return;
  const cpu = players.find(p => p.isCPU && p.slot === slot);
  if (!cpu) return;
  cpu.difficulty = difficulty;
  // No need to re-render full list; the dropdown already reflects the new value.
  broadcastRoster();
}

function refreshHostUI() {
  renderPlayerList(hostPlayersEl, players, 0, { canRemoveCPU: true });
  document.getElementById('btn-add-cpu').disabled = players.length >= MAX_PLAYERS;
  startBtn.disabled = players.length < 2;
  if (players.length >= 2) {
    setHostStatus(
      players.length === MAX_PLAYERS
        ? 'Lobby full! Press Start when ready.'
        : `${players.length} of ${MAX_PLAYERS} ready. Press Start or add more.`,
      'ok'
    );
  } else {
    setHostStatus('Waiting for players to join (or add a CPU)…');
  }
}

// ---------- Host ----------
function startHosting() {
  isHost = true;
  show('host');
  hostCodeEl.textContent = '······';
  setHostStatus('Connecting to lobby server…');
  startBtn.disabled = true;
  // Host occupies slot 0.
  players = [{
    slot: 0, peerId: 'self',
    color: PLAYER_COLORS[0].hex, name: myName || 'Player 1', isHost: true, isCPU: false,
  }];
  cpuCounter = 0;
  refreshHostUI();
  tryClaimCode(0);
}

function tryClaimCode(attempt) {
  if (attempt >= 5) {
    setHostStatus('Could not get a free code. Try again.', 'error');
    return;
  }
  const code = generateCode();
  const peerId = NAMESPACE + code;
  const p = new Peer(peerId, PEER_OPTS);
  dlog('host: claiming code ' + code + ' (attempt ' + (attempt + 1) + ')', 'info');
  p.on('open', () => {
    peer = p;
    myCode = code;
    hostCodeEl.textContent = code;
    setHostStatus('Waiting for players to join…');
    dlog('host: broker open, id=' + peerId, 'info');
  });
  p.on('connection', incoming => {
    dlog('host: incoming connection from ' + incoming.peer);
    acceptIncoming(incoming);
  });
  p.on('error', err => {
    dlog('host: peer error type=' + ((err && err.type) || 'unknown'), 'err');
    if (err && err.type === 'unavailable-id') {
      try { p.destroy(); } catch (e) {}
      tryClaimCode(attempt + 1);
      return;
    }
    setHostStatus('Connection error: ' + ((err && err.type) || 'unknown'), 'error');
  });
  p.on('disconnected', () => {
    dlog('host: disconnected from broker', 'err');
    setHostStatus('Disconnected from lobby. Reconnecting…', 'error');
  });
}

function acceptIncoming(incoming) {
  // Reject if game already started.
  if (gameStarted) {
    incoming.on('open', () => {
      try { incoming.send({ type: 'rejected', reason: 'started' }); } catch (e) {}
      try { incoming.close(); } catch (e) {}
    });
    return;
  }
  // Reject if lobby full.
  if (players.length >= MAX_PLAYERS) {
    incoming.on('open', () => {
      try { incoming.send({ type: 'rejected', reason: 'full' }); } catch (e) {}
      try { incoming.close(); } catch (e) {}
    });
    return;
  }
  conns[incoming.peer] = incoming;

  incoming.on('open', () => {
    const slot = nextFreeSlot();
    if (slot < 0) {
      try { incoming.send({ type: 'rejected', reason: 'full' }); } catch (e) {}
      try { incoming.close(); } catch (e) {}
      delete conns[incoming.peer];
      return;
    }
    const colorObj = PLAYER_COLORS[slot] || PLAYER_COLORS[PLAYER_COLORS.length - 1];
    // Name from connection metadata, with fallback + length cap.
    let joinerName = (incoming.metadata && incoming.metadata.name) || ('Player ' + (slot + 1));
    joinerName = String(joinerName).trim().slice(0, 14) || ('Player ' + (slot + 1));
    const newPlayer = {
      slot, peerId: incoming.peer,
      color: colorObj.hex, name: joinerName, isHost: false, isCPU: false,
    };
    players.push(newPlayer);
    players.sort((a, b) => a.slot - b.slot);
    incoming.send({ type: 'welcome', yourSlot: slot });
    broadcastRoster();
    refreshHostUI();
  });

  incoming.on('close', () => removeConnection(incoming.peer));
  incoming.on('error', () => removeConnection(incoming.peer));
  incoming.on('data', () => { /* clients say nothing for v1 */ });
}

function removeConnection(peerId) {
  if (!isHost) return;
  delete conns[peerId];
  const before = players.length;
  players = players.filter(p => p.peerId !== peerId);
  if (players.length === before) return;
  broadcastRoster();
  refreshHostUI();
}

function broadcastRoster() {
  broadcastToAll({ type: 'roster', players });
}
function broadcastToAll(msg) {
  for (const id in conns) {
    try { conns[id].send(msg); } catch (e) {}
  }
}

// ---------- Join ----------
function submitJoin() {
  const code = joinCodeEl.value.trim().toUpperCase();
  if (code.length !== 6) {
    setJoinStatus('Code should be 6 characters.', 'error');
    return;
  }
  isHost = false;
  setJoinStatus('Connecting…');
  document.getElementById('btn-join-submit').disabled = true;

  dlog('join: creating peer for code ' + code, 'info');
  const p = new Peer(undefined, PEER_OPTS);
  p.on('open', myId => {
    peer = p;
    dlog('join: broker open, my id=' + myId, 'info');
    dlog('join: connecting to ' + NAMESPACE + code);
    const c = p.connect(NAMESPACE + code, { reliable: true, metadata: { name: myName } });
    let opened = false;
    let timeoutId = setTimeout(() => {
      if (!opened) {
        dlog('join: 15s timeout, no data channel established', 'err');
        setJoinStatus('Couldn\'t reach the host. Ask them for a fresh code and try again.', 'error');
        document.getElementById('btn-join-submit').disabled = false;
        try { c.close(); } catch (e) {}
        try { p.destroy(); } catch (e) {}
      }
    }, 15000);

    c.on('open', () => {
      opened = true;
      clearTimeout(timeoutId);
      conns['host'] = c;
      dlog('join: data channel OPEN to host', 'info');
      setJoinStatus('');
      document.getElementById('btn-join-submit').disabled = false;
    });
    // Watch ICE state on the underlying RTCPeerConnection so we can see
    // *why* a connection is or isn't establishing (relay/direct/failed).
    setTimeout(() => {
      const pc = c.peerConnection;
      if (pc) {
        pc.addEventListener('iceconnectionstatechange', () => {
          dlog('join: ICE state = ' + pc.iceConnectionState,
            pc.iceConnectionState === 'failed' ? 'err' : 'info');
        });
      }
    }, 100);
    c.on('data', data => {
      if (!data) return;
      if (data.type === 'rejected') {
        if (data.reason === 'full') setJoinStatus('That game is full.', 'error');
        else if (data.reason === 'started') setJoinStatus('That game has already started.', 'error');
        else setJoinStatus('Could not join.', 'error');
        document.getElementById('btn-join-submit').disabled = false;
        try { c.close(); } catch (e) {}
        try { p.destroy(); } catch (e) {}
        return;
      }
      if (data.type === 'welcome') {
        // Move to waiting room as soon as we know our slot.
        show('waiting');
      }
      if (data.type === 'roster') {
        players = data.players || [];
        const mine = players.find(p => p.peerId === peer.id);
        renderPlayerList(waitingPlayersEl, players, mine ? mine.slot : -1);
      }
      if (data.type === 'start') {
        enterGame();
      }
    });
    c.on('close', () => {
      // Host went away.
      backToMenu();
    });
    c.on('error', err => {
      dlog('join: conn error type=' + ((err && err.type) || 'unknown'), 'err');
      if (!opened) {
        clearTimeout(timeoutId);
        setJoinStatus('Could not reach that game. (' + ((err && err.type) || 'error') + ')', 'error');
        document.getElementById('btn-join-submit').disabled = false;
        try { p.destroy(); } catch (e) {}
      }
    });
  });
  p.on('error', err => {
    dlog('join: peer error type=' + ((err && err.type) || 'unknown'), 'err');
    if (err && err.type === 'peer-unavailable') {
      setJoinStatus('No host with that code is online.', 'error');
    } else {
      setJoinStatus('Connection error: ' + ((err && err.type) || 'unknown'), 'error');
    }
    document.getElementById('btn-join-submit').disabled = false;
  });
}

// ---------- Phase 2: Game scene ----------

// Jungle units = cards. Each one plays differently:
//   - melee  (default): walk up and hit one target
//   - ranged: stop at range, fire arrow projectiles at the nearest enemy
//   - aoe   : melee but the swing damages every enemy near the target
const CARDS = [
  { id: 'monkey',  name: 'Monkey Swarm',  cost: 2, icon: '🐒', hp: 4,  dmg: 1, speed: 3,
    attackType: 'melee',  range: 28,  attackCooldown: 0.55 },
  { id: 'snake',   name: 'Snake Archer',  cost: 3, icon: '🐍', hp: 3,  dmg: 3, speed: 2,
    attackType: 'ranged', range: 140, attackCooldown: 1.1 },
  { id: 'warthog', name: 'Warthog',       cost: 4, icon: '🐗', hp: 8,  dmg: 3, speed: 4,
    attackType: 'melee',  range: 30,  attackCooldown: 0.9 },
  { id: 'gorilla', name: 'Gorilla',       cost: 6, icon: '🦍', hp: 14, dmg: 5, speed: 1,
    attackType: 'aoe',    range: 32,  attackCooldown: 1.4, aoeRadius: 55 },
];

// Where each player's totem sits (canvas px, 800x600). Slot index = corner.
const TOTEM_POSITIONS = [
  { x: 110, y: 130 },  // 0: top-left
  { x: 690, y: 130 },  // 1: top-right
  { x: 110, y: 470 },  // 2: bottom-left
  { x: 690, y: 470 },  // 3: bottom-right
];

const MAX_MANA = 10;
const MANA_REGEN_PER_SEC = 1; // 1 mana / second to start; tune later.
const TOTEM_MAX_HP = 50;
const PLACEMENT_RADIUS = 230;        // how far you can summon from your totem
const UNIT_RADIUS = 13;
const UNIT_AGGRO_RADIUS = 90;        // chase enemies within this range
const UNIT_ATTACK_RADIUS = 28;
const TOTEM_ATTACK_RADIUS = 42;
const ATTACK_COOLDOWN = 0.9;          // seconds between hits
const UNIT_BASE_PIXELS_PER_SEC = 28;  // multiplied by card.speed

let gameState = null;
let groundDecos = []; // grass tufts, pebbles, flowers

function enterGame() {
  show('game');
  // Find which player I am.
  const me = isHost
    ? players[0]
    : (players.find(p => p.peerId === (peer && peer.id)) || null);

  // Top HUD: "You: [name]"
  const youTag = document.getElementById('you-tag');
  if (me) {
    youTag.innerHTML = `<span class="swatch" style="background:${me.color}"></span>You: ${escapeHtml(me.name)}`;
  } else {
    youTag.textContent = isHost ? 'You are the host' : 'You joined the game';
  }
  document.getElementById('game-info').textContent = `${players.length} commanders ready · last totem standing wins`;

  // Build the deck the player can use. Same 4 cards for everyone in v1.
  gameState = {
    active: true,
    mana: 0,
    selectedCardId: null,
    hand: CARDS.slice(0, 4),
    me,
    lastTickTime: performance.now(),
    units: [],
    totemHp: {},
    cpuMana: {},
    cpuTimers: {},
    winner: null,
    floaters: [], // little floating "+5" / "miss" texts
  };
  for (const p of players) {
    gameState.totemHp[p.slot] = TOTEM_MAX_HP;
    if (p.isCPU) {
      gameState.cpuMana[p.slot] = 0;
      // CPU spawn cadence by difficulty
      const baseDelay = p.difficulty === 'hard' ? 1.6
                      : p.difficulty === 'easy' ? 4.0
                      : 2.6;
      gameState.cpuTimers[p.slot] = baseDelay * 0.5; // first one comes faster
    }
  }
  document.getElementById('winner-overlay').classList.remove('active');

  // Generate ground decorations.
  groundDecos = [];
  const reserved = TOTEM_POSITIONS.map(t => ({ x: t.x, y: t.y, r: 75 }));
  for (let i = 0; i < 60; i++) {
    let x, y, ok;
    let tries = 0;
    do {
      ok = true;
      x = 20 + Math.random() * 760;
      y = 20 + Math.random() * 560;
      if (Math.abs(y - 300) < 38) ok = false;
      for (const r of reserved) {
        if (Math.hypot(x - r.x, y - r.y) < r.r * 0.6) { ok = false; break; }
      }
      tries++;
    } while (!ok && tries < 20);
    if (ok) {
      const r = Math.random();
      const kind = r < 0.55 ? 'grass' : (r < 0.85 ? 'pebble' : 'flower');
      groundDecos.push({ x, y, kind, seed: Math.random() });
    }
  }

  renderCardHand();
  requestAnimationFrame(gameLoop);
}

function gameLoop(now) {
  if (!gameState || !gameState.active) return;
  const dt = Math.min(0.1, (now - gameState.lastTickTime) / 1000);
  gameState.lastTickTime = now;

  // Mana regen (player + each CPU)
  if (myCanPlay()) gameState.mana = Math.min(MAX_MANA, gameState.mana + MANA_REGEN_PER_SEC * dt);
  for (const p of players) {
    if (p.isCPU && gameState.totemHp[p.slot] > 0) {
      gameState.cpuMana[p.slot] = Math.min(MAX_MANA, (gameState.cpuMana[p.slot] || 0) + MANA_REGEN_PER_SEC * dt);
    }
  }

  updateUnits(dt);
  updateCPU(dt);
  updateFloaters(dt);
  checkWinCondition();

  drawWorld();
  updateManaUI();

  if (gameState && gameState.active) requestAnimationFrame(gameLoop);
}

function myCanPlay() {
  if (!gameState || !gameState.me) return false;
  return gameState.totemHp[gameState.me.slot] > 0;
}

function drawWorld() {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const time = (gameState ? gameState.lastTickTime : performance.now()) * 0.001;

  // Jungle floor — layered greens
  const floor = ctx.createLinearGradient(0, 0, 0, H);
  floor.addColorStop(0, '#2a5a1e');
  floor.addColorStop(0.5, '#356a26');
  floor.addColorStop(1, '#2a5a1e');
  ctx.fillStyle = floor;
  ctx.fillRect(0, 0, W, H);
  // Subtle texture stripes
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  for (let y = 0; y < H; y += 14) ctx.fillRect(0, y, W, 1);

  // Ground decorations behind everything else
  for (const d of groundDecos) drawGroundDeco(ctx, d, time);

  // River
  drawRiver(ctx, W, H, time);
  // Bridge crosses the river at the middle — units will use this in Phase 3
  drawBridge(ctx, W, H, time);

  // Placement hint circle (draw under units)
  drawPlacementHint(ctx);

  // Totems for every player slot
  for (const p of players) {
    const pos = TOTEM_POSITIONS[p.slot];
    if (!pos) continue;
    const isMe = gameState && gameState.me && p.slot === gameState.me.slot;
    const hp = gameState ? (gameState.totemHp[p.slot] || 0) : TOTEM_MAX_HP;
    const dead = hp <= 0;
    if (dead) ctx.globalAlpha = 0.35;
    drawTotem(ctx, pos.x, pos.y, dead ? '#444' : p.color, p.name, isMe);
    if (dead) ctx.globalAlpha = 1;
    if (gameState) drawTotemHpBar(ctx, pos.x, pos.y, hp, TOTEM_MAX_HP);
  }

  // Units on top of totems
  if (gameState) {
    // Sort by Y so lower units draw in front
    const sorted = gameState.units.slice().sort((a, b) => a.y - b.y);
    for (const u of sorted) drawUnit(ctx, u);
    // Floating texts last
    drawFloaters(ctx);
  }
}

function drawRiver(ctx, W, H, time) {
  const cy = H / 2;
  const halfW = 38;

  // Wavy banks: clip to the river shape so water effects stay inside.
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(0, cy - halfW);
  for (let xx = 0; xx <= W; xx += 6) {
    ctx.lineTo(xx, cy - halfW + Math.sin(xx * 0.05 + time * 0.4) * 5);
  }
  for (let xx = W; xx >= 0; xx -= 6) {
    ctx.lineTo(xx, cy + halfW + Math.sin(xx * 0.05 + time * 0.4 + 2.1) * 5);
  }
  ctx.closePath();
  ctx.clip();

  // Water gradient — deeper / darker in the middle
  const grad = ctx.createLinearGradient(0, cy - halfW - 8, 0, cy + halfW + 8);
  grad.addColorStop(0, '#456e8a');
  grad.addColorStop(0.5, '#1f3a52');
  grad.addColorStop(1, '#456e8a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, cy - halfW - 12, W, halfW * 2 + 24);

  // Submerged stones (look slightly fuzzy due to water above)
  ctx.fillStyle = 'rgba(40, 30, 24, 0.5)';
  for (let i = 0; i < 9; i++) {
    const sx = (i * 95 + 25) % W;
    const sy = cy + ((i * 7) % 24) - 12;
    ctx.beginPath();
    ctx.ellipse(sx, sy, 7 + (i % 3) * 2, 4 + (i % 2), 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = 'rgba(120, 110, 100, 0.18)';
  for (let i = 0; i < 9; i++) {
    const sx = (i * 95 + 25) % W;
    const sy = cy + ((i * 7) % 24) - 14;
    ctx.beginPath();
    ctx.ellipse(sx - 1, sy - 1, 5 + (i % 3), 2.5, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Flowing wave lines
  for (let i = 0; i < 5; i++) {
    const yy = cy - halfW + 8 + i * 14;
    ctx.strokeStyle = `rgba(190, 230, 245, ${0.10 + i * 0.04})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let xx = 0; xx <= W; xx += 5) {
      const off = Math.sin(xx * 0.06 + time * 0.9 + i * 0.7) * 2.5
                + Math.sin(xx * 0.13 - time * 0.5 + i) * 1.2;
      if (xx === 0) ctx.moveTo(xx, yy + off);
      else ctx.lineTo(xx, yy + off);
    }
    ctx.stroke();
  }

  // Sparkles — twinkling bright dots
  for (let i = 0; i < 14; i++) {
    const sx = ((i * 71 + 30) + Math.sin(time * 0.4 + i) * 15) % W;
    const sy = cy + Math.sin(time * 0.8 + i * 1.3) * 22;
    const tw = (Math.sin(time * 3 + i * 2.1) + 1) / 2;
    if (tw > 0.65) {
      ctx.fillStyle = `rgba(255, 255, 255, ${tw * 0.85})`;
      ctx.beginPath();
      ctx.arc(sx, sy, 1.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Lily pads (a few floating dark green ovals with a flower)
  for (const lily of [
    { x: 130, y: cy - 14 }, { x: 380, y: cy + 18 }, { x: 600, y: cy - 12 }
  ]) {
    ctx.fillStyle = '#1a4a18';
    ctx.beginPath();
    ctx.ellipse(lily.x, lily.y, 11, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2a6a22';
    ctx.beginPath();
    ctx.ellipse(lily.x - 1, lily.y - 1, 9, 5.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // Flower
    ctx.fillStyle = '#ffe8b0';
    ctx.beginPath();
    ctx.arc(lily.x + 4, lily.y - 1, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffaa50';
    ctx.beginPath();
    ctx.arc(lily.x + 4, lily.y - 1, 0.8, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();

  // Reedy grass tufts along the banks (drawn outside the clip)
  ctx.fillStyle = '#1a4a14';
  for (let i = 0; i < 18; i++) {
    const rx = (i * 47 + 10) % W;
    drawReedTuft(ctx, rx, cy - halfW - 1 + Math.sin(rx * 0.08) * 4, 1);
    drawReedTuft(ctx, rx + 22, cy + halfW + 1 + Math.sin(rx * 0.11) * 4, -1);
  }
}

function drawBridge(ctx, W, H, time) {
  const cx = W / 2, cy = H / 2;
  const bw = 70;   // east-west width of the bridge deck
  const bl = 110;  // north-south length, pokes past river banks
  const x1 = cx - bw / 2, x2 = cx + bw / 2;
  const y1 = cy - bl / 2, y2 = cy + bl / 2;

  // Soft shadow of the bridge falling on the water
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(cx + 1, cy + 4, bw * 0.78, bl * 0.55, 0, 0, Math.PI * 2);
  ctx.fill();

  // Side rails — long wooden beams down each edge
  ctx.fillStyle = '#5a3614';
  ctx.fillRect(x1 - 5, y1, 8, bl);
  ctx.fillRect(x2 - 3, y1, 8, bl);
  // Rail highlight stripe
  ctx.fillStyle = '#7c5024';
  ctx.fillRect(x1 - 5, y1, 1, bl);
  ctx.fillRect(x2 - 3, y1, 1, bl);
  // Rail bottom edge shadow
  ctx.fillStyle = '#2a1606';
  ctx.fillRect(x1 - 5, y2 - 1, 8, 1);
  ctx.fillRect(x2 - 3, y2 - 1, 8, 1);

  // Cross-planks
  const numPlanks = 14;
  const plankH = bl / numPlanks;
  const plankColors = ['#8a5224', '#a06a30', '#7a4a1c'];
  for (let i = 0; i < numPlanks; i++) {
    const py = y1 + i * plankH;
    ctx.fillStyle = plankColors[i % 3];
    ctx.fillRect(x1, py + 0.5, bw, plankH - 0.5);
    // Gap between planks
    ctx.fillStyle = 'rgba(40, 22, 6, 0.55)';
    ctx.fillRect(x1, py + plankH - 1, bw, 0.8);
    // Subtle wood grain mid-plank
    ctx.fillStyle = 'rgba(40, 22, 6, 0.18)';
    ctx.fillRect(x1 + 6 + (i * 13) % 10, py + plankH * 0.4, bw - 12, 0.5);
    // Tiny nail dots
    ctx.fillStyle = '#3a200a';
    ctx.beginPath();
    ctx.arc(x1 + 4, py + plankH * 0.5, 0.9, 0, Math.PI * 2);
    ctx.arc(x2 - 4, py + plankH * 0.5, 0.9, 0, Math.PI * 2);
    ctx.fill();
  }

  // Top edge highlight (sunlight catching the deck)
  ctx.fillStyle = 'rgba(255, 220, 160, 0.18)';
  ctx.fillRect(x1, y1 + 0.5, bw, 1);

  // Posts at four corners
  ctx.fillStyle = '#3a200a';
  for (const [px, py] of [
    [x1 - 6, y1 - 5], [x2 - 4, y1 - 5],
    [x1 - 6, y2 - 3], [x2 - 4, y2 - 3]
  ]) {
    ctx.fillRect(px, py, 10, 10);
    ctx.fillStyle = '#5a3818';
    ctx.fillRect(px, py, 10, 1);
    ctx.fillRect(px, py, 1, 10);
    ctx.fillStyle = '#3a200a';
  }

  // Rope handrails — sagging arcs between posts on each side
  ctx.strokeStyle = '#cda354';
  ctx.lineWidth = 1.6;
  ctx.lineCap = 'round';
  // Left rope (with two arcs through a midpoint)
  ctx.beginPath();
  ctx.moveTo(x1 - 1, y1);
  ctx.quadraticCurveTo(x1 - 6, cy - bl / 4, x1 - 1, cy);
  ctx.quadraticCurveTo(x1 - 6, cy + bl / 4, x1 - 1, y2);
  ctx.stroke();
  // Right rope
  ctx.beginPath();
  ctx.moveTo(x2 + 1, y1);
  ctx.quadraticCurveTo(x2 + 6, cy - bl / 4, x2 + 1, cy);
  ctx.quadraticCurveTo(x2 + 6, cy + bl / 4, x2 + 1, y2);
  ctx.stroke();
  // Subtle rope twist highlight
  ctx.strokeStyle = 'rgba(255, 230, 160, 0.4)';
  ctx.lineWidth = 0.6;
  ctx.beginPath();
  ctx.moveTo(x1 - 1, y1 + 1);
  ctx.quadraticCurveTo(x1 - 5.5, cy - bl / 4 + 1, x1 - 1, cy + 1);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2 + 1, y1 + 1);
  ctx.quadraticCurveTo(x2 + 5.5, cy - bl / 4 + 1, x2 + 1, cy + 1);
  ctx.stroke();

  // Decorative vines hanging off corners
  ctx.strokeStyle = '#2a5a1a';
  ctx.lineWidth = 1.4;
  // Top-left vine drooping down toward water
  ctx.beginPath();
  ctx.moveTo(x1 - 5, y1 + 4);
  ctx.bezierCurveTo(x1 - 12, y1 + 18, x1 - 8, y1 + 34, x1 - 14, y1 + 50);
  ctx.stroke();
  // Bottom-right vine
  ctx.beginPath();
  ctx.moveTo(x2 + 5, y2 - 4);
  ctx.bezierCurveTo(x2 + 12, y2 - 18, x2 + 8, y2 - 34, x2 + 14, y2 - 50);
  ctx.stroke();
  // Vine leaves
  ctx.fillStyle = '#3a8a2a';
  for (const [lx, ly, rot] of [
    [x1 - 10, y1 + 16, -0.4], [x1 - 7, y1 + 30, 0.3], [x1 - 13, y1 + 47, -0.2],
    [x2 + 10, y2 - 16, 0.4],  [x2 + 7, y2 - 30, -0.3], [x2 + 13, y2 - 47, 0.2],
  ]) {
    ctx.beginPath();
    ctx.ellipse(lx, ly, 4, 2, rot, 0, Math.PI * 2);
    ctx.fill();
  }
  // Tiny leaf highlight
  ctx.fillStyle = 'rgba(160, 230, 120, 0.45)';
  for (const [lx, ly] of [[x1 - 9, y1 + 15], [x2 + 9, y2 - 15]]) {
    ctx.beginPath();
    ctx.arc(lx, ly, 1, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawReedTuft(ctx, x, y, dir) {
  // dir: -1 grows up (top bank), +1 grows down? Actually we always grow up away from water surface.
  ctx.fillStyle = '#1a4a14';
  for (let i = 0; i < 5; i++) {
    const off = (i - 2) * 1.4;
    ctx.beginPath();
    ctx.moveTo(x + off, y);
    ctx.lineTo(x + off - 0.7, y + (dir < 0 ? 6 - Math.abs(off) : -(6 - Math.abs(off))));
    ctx.lineTo(x + off + 0.7, y + (dir < 0 ? 6 - Math.abs(off) : -(6 - Math.abs(off))));
    ctx.closePath();
    ctx.fill();
  }
}

function drawGroundDeco(ctx, d, time) {
  if (d.kind === 'grass') {
    ctx.fillStyle = '#1c4a18';
    for (let i = 0; i < 4; i++) {
      const off = (i - 1.5) * 1.3;
      ctx.beginPath();
      ctx.moveTo(d.x + off, d.y + 2);
      ctx.lineTo(d.x + off - 0.5, d.y - 4 + Math.abs(off) * 0.5);
      ctx.lineTo(d.x + off + 0.7, d.y - 4 + Math.abs(off) * 0.5);
      ctx.closePath();
      ctx.fill();
    }
    // Top highlights
    ctx.fillStyle = '#3a8a2a';
    ctx.beginPath();
    ctx.arc(d.x, d.y - 3, 0.8, 0, Math.PI * 2);
    ctx.fill();
  } else if (d.kind === 'pebble') {
    ctx.fillStyle = '#5a4a3a';
    ctx.beginPath();
    ctx.ellipse(d.x, d.y, 3, 2, d.seed, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#7a6a5a';
    ctx.beginPath();
    ctx.ellipse(d.x - 0.6, d.y - 0.6, 1.5, 0.9, d.seed, 0, Math.PI * 2);
    ctx.fill();
  } else if (d.kind === 'flower') {
    // Stem
    ctx.strokeStyle = '#2a5a1a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(d.x, d.y + 2);
    ctx.lineTo(d.x, d.y - 3);
    ctx.stroke();
    // Petals
    const petalColor = d.seed < 0.33 ? '#ff7aaa' : (d.seed < 0.66 ? '#ffd84a' : '#ffffff');
    ctx.fillStyle = petalColor;
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * Math.PI * 2;
      ctx.beginPath();
      ctx.arc(d.x + Math.cos(a) * 1.6, d.y - 3 + Math.sin(a) * 1.6, 1.4, 0, Math.PI * 2);
      ctx.fill();
    }
    // Center
    ctx.fillStyle = '#cc8030';
    ctx.beginPath();
    ctx.arc(d.x, d.y - 3, 1.1, 0, Math.PI * 2);
    ctx.fill();
  }
}

function shadeHex(hex, percent) {
  let R = parseInt(hex.substring(1, 3), 16);
  let G = parseInt(hex.substring(3, 5), 16);
  let B = parseInt(hex.substring(5, 7), 16);
  R = Math.max(0, Math.min(255, R + R * percent / 100));
  G = Math.max(0, Math.min(255, G + G * percent / 100));
  B = Math.max(0, Math.min(255, B + B * percent / 100));
  const h = n => Math.round(n).toString(16).padStart(2, '0');
  return '#' + h(R) + h(G) + h(B);
}

function drawTotem(ctx, x, y, color, name, isMe) {
  const t = (gameState ? gameState.lastTickTime : performance.now()) * 0.001;
  const pulse = 1 + Math.sin(t * 2) * 0.06;
  const glowPulse = 1 + Math.sin(t * 2) * 0.18;

  // ----- Ground shadow -----
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath();
  ctx.ellipse(x, y + 34, 44, 11, 0, 0, Math.PI * 2);
  ctx.fill();

  // ----- Stacked stone base -----
  // Lower stone (wider)
  ctx.fillStyle = '#5a5a5a';
  ctx.fillRect(x - 30, y + 18, 60, 14);
  ctx.fillStyle = '#3a3a3a';
  ctx.fillRect(x - 30, y + 28, 60, 4);
  ctx.fillStyle = '#7a7a7a';
  ctx.fillRect(x - 30, y + 18, 60, 3);
  // Cracks/specks on lower stone
  ctx.fillStyle = '#4a4a4a';
  ctx.fillRect(x - 18, y + 23, 6, 1);
  ctx.fillRect(x + 5, y + 26, 8, 1);

  // Upper stone (narrower)
  ctx.fillStyle = '#6a6a6a';
  ctx.fillRect(x - 26, y + 8, 52, 12);
  ctx.fillStyle = '#888888';
  ctx.fillRect(x - 26, y + 8, 52, 2);
  ctx.fillStyle = '#4a4a4a';
  ctx.fillRect(x - 26, y + 18, 52, 2);

  // ----- Main pillar (carved tiki face) -----
  ctx.fillStyle = '#8a6a40';
  ctx.fillRect(x - 22, y - 30, 44, 40);
  // Side shading
  ctx.fillStyle = '#a8804a';
  ctx.fillRect(x - 22, y - 30, 4, 40);
  ctx.fillStyle = '#5a4020';
  ctx.fillRect(x + 18, y - 30, 4, 40);

  // Decorative top band in player color
  ctx.fillStyle = color;
  ctx.fillRect(x - 22, y - 30, 44, 5);
  ctx.fillStyle = shadeHex(color, -25);
  ctx.fillRect(x - 22, y - 26, 44, 1);
  // Tribal triangles on band
  ctx.fillStyle = '#3a2a14';
  for (let i = 0; i < 6; i++) {
    const tx = x - 20 + i * 7;
    ctx.beginPath();
    ctx.moveTo(tx, y - 28);
    ctx.lineTo(tx + 3, y - 25);
    ctx.lineTo(tx + 6, y - 28);
    ctx.fill();
  }

  // Eye sockets
  ctx.fillStyle = '#2a1408';
  ctx.fillRect(x - 14, y - 20, 9, 7);
  ctx.fillRect(x + 5, y - 20, 9, 7);
  // Glowing eyes
  ctx.fillStyle = '#ff9540';
  ctx.beginPath();
  ctx.arc(x - 10, y - 17, 2, 0, Math.PI * 2);
  ctx.arc(x + 10, y - 17, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffd87a';
  ctx.beginPath();
  ctx.arc(x - 10, y - 17, 0.8, 0, Math.PI * 2);
  ctx.arc(x + 10, y - 17, 0.8, 0, Math.PI * 2);
  ctx.fill();

  // Nose (small triangle)
  ctx.fillStyle = '#5a4020';
  ctx.beginPath();
  ctx.moveTo(x, y - 10);
  ctx.lineTo(x - 3, y - 4);
  ctx.lineTo(x + 3, y - 4);
  ctx.closePath();
  ctx.fill();

  // Mouth with sharp teeth
  ctx.fillStyle = '#2a1408';
  ctx.fillRect(x - 11, y - 1, 22, 7);
  ctx.fillStyle = '#e8d8a8';
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(x - 10 + i * 5.5, y - 1);
    ctx.lineTo(x - 7.25 + i * 5.5, y + 5);
    ctx.lineTo(x - 4.5 + i * 5.5, y - 1);
    ctx.closePath();
    ctx.fill();
  }

  // ----- Hanging vines on sides -----
  ctx.strokeStyle = '#2a5a1a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x - 22, y - 22);
  ctx.bezierCurveTo(x - 32, y - 14, x - 34, y, x - 28, y + 8);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + 22, y - 22);
  ctx.bezierCurveTo(x + 32, y - 14, x + 34, y, x + 28, y + 8);
  ctx.stroke();
  // Vine leaves
  ctx.fillStyle = '#3a8a2a';
  for (const [lx, ly, r] of [
    [x - 30, y - 12, -0.4], [x - 32, y, 0.2], [x + 30, y - 12, 0.4], [x + 32, y, -0.2]
  ]) {
    ctx.beginPath();
    ctx.ellipse(lx, ly, 4.5, 2.2, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // ----- Glowing crystal/orb on top -----
  const auraR = 34 * glowPulse;
  const aura = ctx.createRadialGradient(x, y - 44, 4, x, y - 44, auraR);
  aura.addColorStop(0, color + 'cc');
  aura.addColorStop(0.4, color + '55');
  aura.addColorStop(1, color + '00');
  ctx.fillStyle = aura;
  ctx.beginPath();
  ctx.arc(x, y - 44, auraR, 0, Math.PI * 2);
  ctx.fill();

  const orbR = 13 * pulse;
  // Dark backing for depth
  ctx.fillStyle = shadeHex(color, -35);
  ctx.beginPath();
  ctx.arc(x, y - 43, orbR, 0, Math.PI * 2);
  ctx.fill();
  // Main orb
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x - 1, y - 44, orbR * 0.88, 0, Math.PI * 2);
  ctx.fill();
  // Bright crescent highlight
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath();
  ctx.arc(x - 4, y - 47, orbR * 0.32, 0, Math.PI * 2);
  ctx.fill();
  // Sparkle dot
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x - 5, y - 48, orbR * 0.13, 0, Math.PI * 2);
  ctx.fill();

  // ----- Name label -----
  ctx.textAlign = 'center';
  ctx.font = 'bold 13px Arial';
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillText(name, x + 1, y + 51);
  ctx.fillStyle = isMe ? '#ffd84a' : '#fff';
  ctx.fillText(name, x, y + 50);
  if (isMe) {
    ctx.font = 'bold 10px Arial';
    ctx.fillStyle = '#ffd84a';
    ctx.fillText('(YOU)', x, y + 64);
  }
}

// Single big sword SVG used in card stats (renders the same on every device).
const SWORD_SVG = `<svg viewBox="0 0 14 16" width="13" height="15" aria-hidden="true">
  <polygon points="7,1 5,9 9,9" fill="#cfd2dc" stroke="#2a2a36" stroke-width="0.6"/>
  <polygon points="7,1 7,9 9,9" fill="#9aa0ac"/>
  <rect x="3" y="9" width="8" height="1.6" fill="#5a3a1a" stroke="#2a1408" stroke-width="0.3"/>
  <rect x="6" y="10.6" width="2" height="3.2" fill="#3a200a"/>
  <circle cx="7" cy="14.5" r="1.1" fill="#8a5a28" stroke="#2a1408" stroke-width="0.3"/>
</svg>`;

function renderCardHand() {
  const handEl = document.getElementById('card-hand');
  let html = '';
  for (const c of gameState.hand) {
    html += `<div class="card" data-card-id="${c.id}">
      <div class="card-cost">${c.cost}</div>
      <div class="card-name">${escapeHtml(c.name)}</div>
      <div class="card-art"><span class="card-icon">${c.icon}</span></div>
      <div class="card-stats">
        <span class="stat hp">♥ ${c.hp}</span>
        <span class="stat dmg">${SWORD_SVG} ${c.dmg}</span>
      </div>
    </div>`;
  }
  handEl.innerHTML = html;
  handEl.querySelectorAll('.card').forEach(el => {
    el.onclick = () => selectCard(el.dataset.cardId);
  });
}

function selectCard(cardId) {
  const card = gameState.hand.find(c => c.id === cardId);
  if (!card) return;
  if (gameState.mana < card.cost) return; // can't afford
  // Toggle selection
  gameState.selectedCardId = (gameState.selectedCardId === cardId) ? null : cardId;
  refreshCardSelection();
}

function refreshCardSelection() {
  const handEl = document.getElementById('card-hand');
  handEl.querySelectorAll('.card').forEach(el => {
    const id = el.dataset.cardId;
    const card = gameState.hand.find(c => c.id === id);
    el.classList.toggle('selected', gameState.selectedCardId === id);
    el.classList.toggle('too-expensive', gameState.mana < card.cost);
  });
}

// ----- Sound effects (Web Audio, all synthesized — no asset files) -----

let audioCtx = null;
let muted = false;
let lastClashTime = 0;
let lastTotemHitTime = 0;

function ensureAudio() {
  if (!audioCtx) {
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (Ctx) audioCtx = new Ctx();
    } catch (e) { audioCtx = null; }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function setMuted(m) {
  muted = m;
  const btn = document.getElementById('btn-mute');
  if (btn) {
    btn.textContent = muted ? '🔇' : '🔊';
    btn.title = muted ? 'Unmute sounds' : 'Mute sounds';
  }
}
document.getElementById('btn-mute').onclick = () => setMuted(!muted);

function playTone(freq, dur, opts) {
  if (muted || !audioCtx) return;
  opts = opts || {};
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = opts.type || 'sine';
  osc.frequency.setValueAtTime(freq, t0);
  if (opts.endFreq) osc.frequency.exponentialRampToValueAtTime(Math.max(20, opts.endFreq), t0 + dur);
  const peak = opts.volume != null ? opts.volume : 0.25;
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(peak, t0 + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0 + dur + 0.05);
}
function playNoiseBurst(dur, filterFreq, volume) {
  if (muted || !audioCtx) return;
  const t0 = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * dur), audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (d.length * 0.4));
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'bandpass';
  filt.frequency.value = filterFreq;
  filt.Q.value = 0.7;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(volume, t0);
  src.connect(filt).connect(gain).connect(audioCtx.destination);
  src.start(t0);
}

function playSummon()    { playTone(440, 0.18, { type: 'sine',     endFreq: 880, volume: 0.22 }); }
function playSwordClash() {
  // Rate-limit clashes so 30 simultaneous attacks don't deafen anyone.
  const now = performance.now();
  if (now - lastClashTime < 60) return;
  lastClashTime = now;
  playNoiseBurst(0.09, 2200, 0.18);
}
function playTotemHit() {
  const now = performance.now();
  if (now - lastTotemHitTime < 100) return;
  lastTotemHitTime = now;
  playTone(140, 0.22, { type: 'sine',     endFreq: 60,  volume: 0.4 });
  playNoiseBurst(0.12, 220, 0.18);
}
function playUnitDeath() { playTone(280, 0.32, { type: 'sawtooth', endFreq: 90,  volume: 0.18 }); }
function playTotemDeath() {
  // Big descending boom
  playTone(180, 0.6, { type: 'sawtooth', endFreq: 50, volume: 0.35 });
  setTimeout(() => playNoiseBurst(0.4, 180, 0.25), 50);
}
function playVictory() {
  if (muted || !audioCtx) return;
  const notes = [523.25, 659.25, 783.99, 1046.5];
  notes.forEach((f, i) =>
    setTimeout(() => playTone(f, 0.32, { type: 'triangle', volume: 0.28 }), i * 110)
  );
}
function playDefeat() {
  if (muted || !audioCtx) return;
  const notes = [392, 349.23, 311.13, 261.63];
  notes.forEach((f, i) =>
    setTimeout(() => playTone(f, 0.4, { type: 'sawtooth', volume: 0.22 }), i * 180)
  );
}

// ----- Phase 3: combat / units / CPU AI -----

function spawnUnit(card, x, y, ownerSlot) {
  if (!gameState) return;
  const owner = players.find(p => p.slot === ownerSlot);
  if (!owner) return;
  gameState.units.push({
    x, y,
    hp: card.hp,
    maxHp: card.hp,
    dmg: card.dmg,
    speed: card.speed,
    ownerSlot,
    color: owner.color,
    icon: card.icon,
    cooldown: 0,
    spawnPulse: 1,
  });
}

function updateUnits(dt) {
  // Decide each unit's target / attack
  for (const u of gameState.units) {
    if (u.hp <= 0) continue;
    if (u.cooldown > 0) u.cooldown = Math.max(0, u.cooldown - dt);
    if (u.spawnPulse > 0) u.spawnPulse = Math.max(0, u.spawnPulse - dt * 2);

    // Find nearest enemy unit
    let nearestEnemy = null;
    let nearestDist = Infinity;
    for (const o of gameState.units) {
      if (o.ownerSlot === u.ownerSlot || o.hp <= 0) continue;
      const d = Math.hypot(u.x - o.x, u.y - o.y);
      if (d < nearestDist) { nearestDist = d; nearestEnemy = o; }
    }

    let target = null;

    // If close enough to attack an enemy unit, do that.
    if (nearestEnemy && nearestDist <= UNIT_ATTACK_RADIUS) {
      if (u.cooldown <= 0) {
        nearestEnemy.hp -= u.dmg;
        u.cooldown = ATTACK_COOLDOWN;
        spawnFloater(nearestEnemy.x, nearestEnemy.y - 16, '-' + u.dmg, '#ffd84a');
        playSwordClash();
      }
    } else if (nearestEnemy && nearestDist <= UNIT_AGGRO_RADIUS) {
      target = { x: nearestEnemy.x, y: nearestEnemy.y };
    } else {
      // Walk toward the nearest *living* enemy totem.
      let nt = null, nd = Infinity, ntSlot = null;
      for (const p of players) {
        if (p.slot === u.ownerSlot) continue;
        if ((gameState.totemHp[p.slot] || 0) <= 0) continue;
        const pos = TOTEM_POSITIONS[p.slot];
        const d = Math.hypot(u.x - pos.x, u.y - pos.y);
        if (d < nd) { nd = d; nt = pos; ntSlot = p.slot; }
      }
      if (nt) {
        if (nd <= TOTEM_ATTACK_RADIUS) {
          if (u.cooldown <= 0) {
            const wasAlive = gameState.totemHp[ntSlot] > 0;
            gameState.totemHp[ntSlot] = Math.max(0, gameState.totemHp[ntSlot] - u.dmg);
            u.cooldown = ATTACK_COOLDOWN;
            spawnFloater(nt.x, nt.y - 30, '-' + u.dmg, '#ff7a5a');
            if (wasAlive && gameState.totemHp[ntSlot] === 0) playTotemDeath();
            else playTotemHit();
          }
        } else {
          target = { x: nt.x, y: nt.y };
        }
      }
    }

    // Move toward target (if any)
    if (target) {
      const dx = target.x - u.x;
      const dy = target.y - u.y;
      const d = Math.hypot(dx, dy);
      if (d > 0.1) {
        const v = u.speed * UNIT_BASE_PIXELS_PER_SEC * dt;
        u.x += (dx / d) * v;
        u.y += (dy / d) * v;
      }
    }
  }

  // Soft repulsion so allied units don't pile up on the same pixel
  for (let i = 0; i < gameState.units.length; i++) {
    for (let j = i + 1; j < gameState.units.length; j++) {
      const a = gameState.units[i], b = gameState.units[j];
      if (a.hp <= 0 || b.hp <= 0) continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.hypot(dx, dy);
      const min = UNIT_RADIUS * 1.6;
      if (d > 0 && d < min) {
        const push = (min - d) * 0.5;
        a.x -= (dx / d) * push;
        a.y -= (dy / d) * push;
        b.x += (dx / d) * push;
        b.y += (dy / d) * push;
      }
    }
  }

  // Drop dead units + spawn a quick particle effect when they die
  const survivors = [];
  let deathsThisFrame = 0;
  for (const u of gameState.units) {
    if (u.hp > 0) survivors.push(u);
    else { spawnFloater(u.x, u.y, 'X', '#ff5a4a'); deathsThisFrame++; }
  }
  if (deathsThisFrame > 0) playUnitDeath();
  gameState.units = survivors;
}

function updateCPU(dt) {
  for (const p of players) {
    if (!p.isCPU) continue;
    if ((gameState.totemHp[p.slot] || 0) <= 0) continue;
    gameState.cpuTimers[p.slot] = (gameState.cpuTimers[p.slot] || 0) - dt;
    if (gameState.cpuTimers[p.slot] > 0) continue;

    // Pick a random card the CPU can afford.
    const mana = gameState.cpuMana[p.slot] || 0;
    const affordable = CARDS.filter(c => c.cost <= mana);
    if (affordable.length === 0) {
      gameState.cpuTimers[p.slot] = 0.4;
      continue;
    }
    // Hard CPUs prefer their best (highest cost) affordable unit.
    let card;
    if (p.difficulty === 'hard') card = affordable[affordable.length - 1];
    else if (p.difficulty === 'easy') card = affordable[Math.floor(Math.random() * affordable.length)];
    else card = affordable[Math.min(affordable.length - 1, Math.floor(Math.random() * (affordable.length + 1)))];

    // Spawn near their totem, biased toward the map center.
    const pos = TOTEM_POSITIONS[p.slot];
    const cx = 400, cy = 300;
    const towardX = (cx - pos.x);
    const towardY = (cy - pos.y);
    const tlen = Math.hypot(towardX, towardY);
    const offX = (towardX / tlen) * (60 + Math.random() * 80) + (Math.random() - 0.5) * 40;
    const offY = (towardY / tlen) * (60 + Math.random() * 80) + (Math.random() - 0.5) * 40;
    spawnUnit(card, pos.x + offX, pos.y + offY, p.slot);
    gameState.cpuMana[p.slot] -= card.cost;

    // Schedule next spawn based on difficulty.
    const baseDelay = p.difficulty === 'hard' ? 1.6
                    : p.difficulty === 'easy' ? 4.0
                    : 2.6;
    gameState.cpuTimers[p.slot] = baseDelay + Math.random() * 0.6;
  }
}

function checkWinCondition() {
  if (gameState.winner) return;
  const alive = players.filter(p => (gameState.totemHp[p.slot] || 0) > 0);
  if (alive.length <= 1) {
    gameState.winner = alive[0] || null;
    showWinnerScreen(gameState.winner);
  }
}

function showWinnerScreen(winner) {
  const overlay = document.getElementById('winner-overlay');
  const title = document.getElementById('winner-title');
  const nameEl = document.getElementById('winner-name');
  if (!winner) {
    title.textContent = 'DRAW';
    nameEl.innerHTML = 'Nobody made it.';
  } else {
    const isMe = gameState.me && winner.slot === gameState.me.slot;
    title.textContent = isMe ? 'VICTORY!' : 'DEFEAT';
    nameEl.innerHTML = `<span class="swatch" style="background:${winner.color}"></span>${escapeHtml(winner.name)} wins!`;
    if (isMe) playVictory(); else playDefeat();
  }
  overlay.classList.add('active');
}

document.getElementById('btn-play-again').onclick = () => {
  document.getElementById('winner-overlay').classList.remove('active');
  backToMenu();
};

function spawnFloater(x, y, text, color) {
  if (!gameState) return;
  gameState.floaters.push({ x, y, text, color, life: 0.9, max: 0.9 });
}
function updateFloaters(dt) {
  for (const f of gameState.floaters) { f.life -= dt; f.y -= 22 * dt; }
  gameState.floaters = gameState.floaters.filter(f => f.life > 0);
}

// ----- Click to summon a unit -----

const gameCanvas = document.getElementById('game');
gameCanvas.addEventListener('click', e => {
  if (!gameState || !gameState.active || gameState.winner) return;
  if (!myCanPlay()) return;
  if (!gameState.selectedCardId) return;
  const card = gameState.hand.find(c => c.id === gameState.selectedCardId);
  if (!card || gameState.mana < card.cost) return;

  const rect = gameCanvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (gameCanvas.width / rect.width);
  const y = (e.clientY - rect.top) * (gameCanvas.height / rect.height);

  // Must be within placement radius of player's totem.
  const myPos = TOTEM_POSITIONS[gameState.me.slot];
  if (Math.hypot(x - myPos.x, y - myPos.y) > PLACEMENT_RADIUS) {
    spawnFloater(x, y, 'too far!', '#ff7a5a');
    return;
  }
  spawnUnit(card, x, y, gameState.me.slot);
  gameState.mana -= card.cost;
  gameState.selectedCardId = null;
  refreshCardSelection();
  playSummon();
});

// ----- Drawing helpers for combat -----

function drawUnit(ctx, u) {
  // Spawn pulse halo
  if (u.spawnPulse > 0) {
    ctx.fillStyle = `rgba(255,255,255,${u.spawnPulse * 0.5})`;
    ctx.beginPath();
    ctx.arc(u.x, u.y, UNIT_RADIUS + 14 * u.spawnPulse, 0, Math.PI * 2);
    ctx.fill();
  }
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(u.x, u.y + UNIT_RADIUS - 1, UNIT_RADIUS * 0.9, UNIT_RADIUS * 0.3, 0, 0, Math.PI * 2);
  ctx.fill();
  // Body
  ctx.fillStyle = u.color;
  ctx.beginPath();
  ctx.arc(u.x, u.y, UNIT_RADIUS, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.6;
  ctx.stroke();
  // Icon
  ctx.font = '17px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(u.icon, u.x, u.y + 1);
  // HP bar above unit
  const barW = 24, barH = 3;
  const pct = Math.max(0, u.hp) / u.maxHp;
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(u.x - barW / 2, u.y - UNIT_RADIUS - 8, barW, barH);
  ctx.fillStyle = pct > 0.5 ? '#5acc4a' : (pct > 0.25 ? '#ffd84a' : '#ff5a4a');
  ctx.fillRect(u.x - barW / 2, u.y - UNIT_RADIUS - 8, barW * pct, barH);
}

function drawTotemHpBar(ctx, x, y, hp, maxHp) {
  const barW = 56, barH = 5;
  const pct = Math.max(0, hp) / maxHp;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(x - barW / 2, y - 60, barW, barH);
  ctx.fillStyle = pct > 0.5 ? '#5acc4a' : (pct > 0.25 ? '#ffd84a' : '#ff5a4a');
  ctx.fillRect(x - barW / 2, y - 60, barW * pct, barH);
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1;
  ctx.strokeRect(x - barW / 2, y - 60, barW, barH);
}

function drawPlacementHint(ctx) {
  if (!gameState || !gameState.me) return;
  if (!gameState.selectedCardId) return;
  if (!myCanPlay()) return;
  const pos = TOTEM_POSITIONS[gameState.me.slot];
  ctx.save();
  ctx.strokeStyle = 'rgba(255, 216, 74, 0.5)';
  ctx.fillStyle = 'rgba(255, 216, 74, 0.07)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 8]);
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, PLACEMENT_RADIUS, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

function drawFloaters(ctx) {
  if (!gameState || !gameState.floaters) return;
  ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'center';
  for (const f of gameState.floaters) {
    const a = Math.max(0, f.life / f.max);
    ctx.fillStyle = 'rgba(0,0,0,' + (a * 0.8) + ')';
    ctx.fillText(f.text, f.x + 1, f.y + 1);
    // Translate hex color to rgba for alpha
    ctx.fillStyle = f.color;
    ctx.globalAlpha = a;
    ctx.fillText(f.text, f.x, f.y);
    ctx.globalAlpha = 1;
  }
}

function updateManaUI() {
  const fill = document.getElementById('mana-fill');
  const text = document.getElementById('mana-text');
  const pct = (gameState.mana / MAX_MANA) * 100;
  fill.style.width = pct + '%';
  text.textContent = Math.floor(gameState.mana) + ' / ' + MAX_MANA;
  // Refresh card affordability whenever mana ticks past a card cost.
  refreshCardSelection();
}
